<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Portfolio Review{% endblock %} — VoLo Earth</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Match the existing app's palette */
    :root {
      --pr-bg: #f7f7f8;
      --pr-card: #ffffff;
      --pr-border: #e5e7eb;
      --pr-text: #111827;
      --pr-muted: #6b7280;
      --pr-accent: #1f4e78;
    }
    body { background: var(--pr-bg); color: var(--pr-text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .pr-card { background: var(--pr-card); border: 1px solid var(--pr-border); border-radius: 8px; }
    .pr-section-pill { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; color: white; letter-spacing: 0.04em; }
    .pr-link { color: #1d4ed8; }
    .pr-link:hover { text-decoration: underline; }
    table.pr-table { width: 100%; border-collapse: collapse; }
    table.pr-table th { text-align: left; font-weight: 600; font-size: 12px; color: var(--pr-muted); text-transform: uppercase; padding: 8px 12px; border-bottom: 1px solid var(--pr-border); }
    table.pr-table td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
    table.pr-table tr:hover td { background: #f9fafb; }
    .pr-num { font-variant-numeric: tabular-nums; text-align: right; }
  </style>
</head>
<body>
  <nav class="bg-white border-b border-gray-200 sticky top-0 z-30">
    <div class="max-w-7xl mx-auto px-6 h-14 flex items-center gap-6">
      <a href="/portfolio-review/" class="font-semibold text-gray-900 flex items-center gap-2">
        <span class="inline-block w-2 h-2 rounded-full" style="background: var(--pr-accent)"></span>
        Portfolio Review
      </a>
      <div class="hidden md:flex items-center gap-1 text-sm overflow-x-auto">
        {% for s in sections %}
          {% if s.slug not in ('archive',) %}
          <a href="/portfolio-review/{{ s.slug }}"
             class="px-3 py-1.5 rounded text-gray-700 hover:bg-gray-100 whitespace-nowrap"
             style="border-left: 3px solid {{ s.color }}; padding-left: 10px;">
            {{ s.num }} · {{ s.name }}
          </a>
          {% endif %}
        {% endfor %}
      </div>
      <div class="ml-auto flex items-center gap-3 text-sm">
        {% if user %}
          <span class="text-gray-500">{{ user.username }}</span>
          <a href="/" class="pr-link">← VoLo Engine</a>
        {% else %}
          <a href="/" class="pr-link">Sign in</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>

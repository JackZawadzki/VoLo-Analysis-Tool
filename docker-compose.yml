version: "3.9"

services:
  volo-engine:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data/sources:/app/data/sources:ro
      - ./configs:/app/configs:ro
      - volo-db:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/data-status')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  volo-db:
